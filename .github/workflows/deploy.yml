# 가족 추억 보관 상자 — 정적 웹 배포 자동화
# GitHub Secrets에 다음 값을 설정하세요:
#   KAKAO_REST_API_KEY      - 카카오 로컬 API 키
#   CLOUDFLARE_API_TOKEN    - Cloudflare Pages 배포 토큰
#   WEB_PASSWORD            - 공유 웹사이트 비밀번호

name: Deploy Static Web

on:
  workflow_dispatch:  # 수동 트리거

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r server/requirements.txt

      - name: Build & Deploy
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          WEB_PASSWORD: ${{ secrets.WEB_PASSWORD }}
        run: |
          echo "🔨 정적 웹 빌드 + AES-256 암호화..."
          # 빌드 스크립트 실행 (추후 구현)
          echo "✅ 빌드 완료"
