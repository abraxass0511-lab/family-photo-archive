name: family_photo_archive
description: 클라우드 제로 기반 가족 사진 아카이브 — 위치·인물 매칭 사진 관리 앱

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # === UI ===
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # === 지도 (OpenStreetMap, 100% 무료) ===
  flutter_map: ^7.0.2
  flutter_map_marker_cluster: ^1.4.0
  latlong2: ^0.9.1

  # === 로컬 DB ===
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # === 네트워크 ===
  http: ^1.3.0
  dio: ^5.7.0

  # === 상태 관리 ===
  provider: ^6.1.2

  # === 사진/미디어 ===
  photo_manager: ^3.6.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # === 유틸리티 ===
  shared_preferences: ^2.3.4
  intl: ^0.19.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/

  fonts:
    - family: NotoSansKR
      fonts:
        - asset: fonts/NotoSansKR-Regular.ttf
        - asset: fonts/NotoSansKR-Medium.ttf
          weight: 500
        - asset: fonts/NotoSansKR-Bold.ttf
          weight: 700
