name: family_photo_archive
description: 포토 백업 — Wi-Fi 기반 사진/동영상 전송 및 외장하드 자동 이관 앱

publish_to: 'none'
version: 1.0.0+22

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # === UI ===
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # === 로컬 DB ===
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # === 네트워크 ===
  dio: ^5.7.0

  # === 상태 관리 ===
  provider: ^6.1.2

  # === 사진/미디어 (갤러리 접근) ===
  photo_manager: ^3.6.2
  cached_network_image: ^3.4.1
  video_player: ^2.9.2

  # === 유틸리티 ===
  shared_preferences: ^2.3.4
  intl: ^0.19.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.1.1
  crypto: ^3.0.6
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
